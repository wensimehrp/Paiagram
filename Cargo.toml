[workspace]
members = ["crates/*"]
exclude = ["crates/epaint_default_fonts"]
default-members = ["crates/paiagram-app"]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MPL-2.0"
authors = ["Jeremy Gao <wensimehrp@gmail.com>"]
description = "Web/desktop timetabling application"
documentation = "https://paiagram.com/docs"
readme = "README.md"
repository = "https://github.com/wensimehrp/paiagram"
homepage = "https://paiagram.com"
keywords = ["timetabling", "scheduler", "web", "diagram"]
categories = ["visualization"]

[patch.crates-io]
epaint_default_fonts = { path = "crates/epaint_default_fonts" }

# Enable a small amount of optimization in the dev profile.
[profile.dev]
opt-level = 1

# Enable a large amount of optimization in the dev profile for dependencies.
[profile.dev.package."*"]
opt-level = 3

# Enable more optimization in the release profile at the cost of compile time.
[profile.release]
codegen-units = 1
opt-level = 2
lto = "fat"
panic = "abort"
strip = true

# Optimize for size in the wasm-release profile to reduce load times and bandwidth usage on web.
[profile.wasm-release]
inherits = "release"
opt-level = "s"
