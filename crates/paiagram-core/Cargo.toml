[package]
name = "paiagram-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
readme.workspace = true
repository.workspace = true
homepage.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
paiagram-rw = { path = "../paiagram-rw" }
paiagram-oudia = { git = "https://github.com/wensimehrp/paiagram-oudia", branch = "main" }
rand = "0.9.2"
serde.workspace = true
bevy.workspace = true
bevy_reflect = { version = "*", features = ["petgraph"] }
petgraph.workspace = true
derive_more = { version = "2.1.0", features = ["full"] }
serde_json.workspace = true
ib-matcher.workspace = true
rfd.workspace = true
git-version = "0.3.9"
chrono.workspace = true
clap.workspace = true
instant.workspace = true
rayon.workspace = true
eframe.workspace = true
egui.workspace = true
egui-i18n.workspace = true
smallvec.workspace = true
either.workspace = true
bitvec = "1.0.1"
visgraph = "0.1.0"
ron.workspace = true
moonshine-core = "0.5.1"
urlencoding.workspace = true
ehttp = { version = "0.6.0", features = ["json", "native-async"] }
strsim = "0.11.1"
lz4_flex.workspace = true
thiserror = "2.0.17"
itertools.workspace = true
gtfs-structures = { version = "0.46.1", default-features = false }
bytemuck.workspace = true
encoding_rs = "0.8.35"
rstar = "0.12.2"
num-format.workspace = true
eros.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq = { version = "3.1.4", features = ["_tls"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
wasm-bindgen.workspace = true
wasm-bindgen-futures.workspace = true
web-sys = { version = "0.3", features = [
    "Document",
    "Element",
    "HtmlAnchorElement",
    "Window",
    "Blob",
    "BlobPropertyBag",
    "Url",
] }
idb = "0.6.5"
js-sys.workspace = true
