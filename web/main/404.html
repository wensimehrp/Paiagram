<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title data-l10n-id="not_found_page_title">404 — Paiagram</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="067cd05f-b395-4813-916c-2063c383685f"></script>
    <script type="module" src="./l10n.js"></script>
    <style>
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        main {
            max-width: 40rem;
            text-align: center;
        }

        .code {
            margin: 0;
            font-size: clamp(3rem, 12vw, 6rem);
            line-height: 1;
            color: var(--accent);
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }
    </style>
</head>

<body>
    <main>
        <p class="code">404</p>

        <h1 data-l10n-id="not_found_heading">Page not found</h1>
        <p data-l10n-id="not_found_body">The page you requested does not exist, was moved, or the link is incorrect.</p>

        <div class="actions">
            <a class="link-card link-card-main" href="./">
                <span data-l10n-id="not_found_home_title">Go home</span>
                <small data-l10n-id="not_found_home_subtitle">Return to the main Paiagram page.</small>
            </a>
            <a class="link-card" href="https://github.com/WenSimEHRP/Paiagram/issues">
                <span data-l10n-id="not_found_report_title">Report an issue</span>
                <small data-l10n-id="not_found_report_subtitle">Let us know if this link should exist.</small>
            </a>
        </div>
    </main>
</body>

</html>
