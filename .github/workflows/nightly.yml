name: Nightly Build & Pages Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.*'
      - 'flake.*'
      - 'crates/**'
      - '.cargo/**'
      - 'web/nightly/**'
      - '.github/workflows/nightly.yml'
  workflow_dispatch:

concurrency:
  group: wasm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v20

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache cargo build data
        uses: Swatinem/rust-cache@v2

      - name: Download Sarasa fonts
        run: nix develop .#default --command just get-fonts

      - name: Prepare Pages artifact
        run: nix develop .#default --command just prep-wasm

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PERSONAL_TOKEN }}
          external_repository: WenSimEHRP/Paiagram-Archive
          publish_branch: main
          publish_dir: ./dist/nightly
          destination_dir: nightly
