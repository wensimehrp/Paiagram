name: Nightly Build & Pages Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: wasm
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v20

      - name: Configure Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Cache cargo build data
        uses: Swatinem/rust-cache@v2

      - name: Download Sarasa fonts
        run: nix develop .#default --command just get-fonts

      # TODO: move shiroa into nix instead of having it here
      - name: Get shiroa latest commit hash
        id: get-rev
        run: echo "rev=$(git ls-remote https://github.com/Myriad-Dreamin/shiroa HEAD | awk '{ print $1 }')" >> $GITHUB_OUTPUT
      - name: Cache shiroa
        id: cache-shiroa
        uses: actions/cache@v3
        with:
          path: ~/.cargo/bin/shiroa
          key: ${{ runner.os }}-shiroa-${{ steps.get-rev.outputs.rev }}
      - name: Install Rust
        if: steps.cache-shiroa.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
      - name: Install shiroa
        if: steps.cache-shiroa.outputs.cache-hit != 'true'
        run: cargo install --git https://github.com/Myriad-Dreamin/shiroa --locked shiroa

      - name: Prepare Pages artifact
        run: nix develop .#default --command just nightly-build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=paiagram --branch=main
